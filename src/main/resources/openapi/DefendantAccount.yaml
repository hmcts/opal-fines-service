openapi: 3.1.1

servers:
  - url: http://localhost:4550/

info:
  description: Opal Fines Service - Defendant Account
  version: v0.0.1
  title: Opal Fines Service

paths:
  /defendant-accounts/{id}/enforcement-status:
    get:
      tags:
        - Defendant Account
      summary: Get Defendant Account Enforcement Status
      description: The Get Defendant Account Enforcement Status API will be used to return the enforcement related information relating to a defendant account.
      operationId: getEnforcementStatus
      security:
        - permissions:
            - Search and View Accounts (in at least one business unit)
      parameters:
        - in: path
          name: id
          description: DB Mapping - defendant_accounts.defendant_account_id
          schema:
            type: integer
            format: int64
          required: true
        - in: header
          name: Authorization
          description: Bearer token
          schema:
            type: string
          required: false
      responses:
        '200':
          description: OK
          headers:
            ETag:
              $ref: './common.yaml#/components/headers/ETag'
          content:
            application/json:
              schema:
                title: Get Enforcement Status Response
                type: object
                x-extendable: true
                additionalProperties: false
                properties:
                  enforcement_overview:
                    $ref: '#/components/schemas/enforcementOverview'
                  enforcement_override:
                    $ref: './common.yaml#/components/schemas/enforcementOverride'
                  last_enforcement_action:
                    $ref: '#/components/schemas/enforcementAction'
                  next_enforcement_action_data:
                    type: string
                    pattern: '^(?i:all|[A-Za-z0-9]{1,6}(,[A-Za-z0-9]{1,6})*|)$'
                    description: 'A comma-separated list of result IDs, ''all'' , or null .'
                  defendant_account_type:
                    type: string
                    enum:
                      - adult
                      - company
                      - youth
                  account_status_reference:
                    $ref: './common.yaml#/components/schemas/accountStatusReference'
                  employer_flag:
                    type: boolean
                  is_hmrc_check_eligible:
                    type: boolean
                    description: |
                      This field will return true if all of the following are met, else will return false.
                      - The defendant account has a date of birth
                      - The defendant account has a national insurance number
                      - The defendant account has a first name
                      - The defendant account has a last name
                      - The defendant account does not have zero balance
                      - The defendant account type is not one of the following
                      -- Company
                      -- Youth
                      -- Parent / guardian to pay
                required:
                  - enforcement_overview
                  - defendant_account_type
                  - account_status_reference
                  - employer_flag
                  - is_hmrc_check_eligible

        400:
          description: Bad request
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        401:
          description: Unauthorized
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        403:
          description: Forbidden
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        500:
          description: Internal server error
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        503:
          description: Service unavailable
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
  /defendant-accounts/{id}/header-summary-openapi-autogenerated-version:
    get:
      tags:
        - Defendant Account
      summary: Get Defendant Account Header Summary
      description: Returns a Header Summary for a Defendant Account.
      operationId: getDefendantAccountHeaderSummary
      security:
        - permissions:
            - Search and View Accounts (in at least one business unit)
      parameters:
        - in: path
          name: id
          description: DB Mapping - defendant_accounts.defendant_account_id
          schema:
            type: integer
            format: int64
          required: true
      responses:
        '200':
          description: OK
          headers:
            ETag:
              $ref: './common.yaml#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                required:
                  - defendant_account_id
                  - account_number
                  - defendant_party_id
                  - debtor_type
                  - is_youth
                  - has_consolidated_accounts
                  - account_status_reference
                  - account_type
                  - originator_type
                  - originator_name
                  - business_unit_summary
                  - payment_state_summary
                  - party_details
                properties:
                  defendant_account_id:
                    type: string
                    description: DB Mapping - defendant_accounts.defendant_account_id
                  account_number:
                    type: string
                    description: DB Mapping - defendant_accounts.account_number
                  defendant_party_id:
                    type: string
                    description: defendant_account_parties.defendant_account_party_id (where defendant_account_parties.association_type = 'Defendant')
                  parent_guardian_party_id:
                    type: string
                    description: |
                      Only provided if a parent/guardian has been associated with the account, during account creation.
                      DB Mapping - defendant_account_parties.defendant_account_party_id (where defendant_account_parties.association_type = 'Parent/Guardian')
                  debtor_type:
                    type: string
                    enum:
                      - Defendant
                      - Parent/Guardian
                    description: |
                      This field will be set to 'Defendant' if defendant_account_parties.debtor = 'TRUE', otherwise if this is null and a Parent/Guardian is on the account with defendant_account_parties.debtor = 'TRUE', then the value returned is 'Parent/Guardian'.
                      DB Mapping - defendant_account_parties.debtor (where debtor = True)
                  is_youth:
                    type: boolean
                    description: |
                      DERIVED FROM THE DEFENDANT
                      The BE will need to check the defendants DOB via (parties.birth_date) and if:
                      parties.birth_date ≥ 18, then value is FALSE
                      I.e. An Adult defendant
                      parties.birth_date < 18, then value is TRUE
                      I.e. A Youth defendant
                      If parties.birth_date = null, then the defendants age (parties.age) should be observed:
                      parties.age ≥ 18, then the value is ‘FALSE’
                      parties.age < 18, then the value is ‘TRUE’
                      parties.age = null, then the value is ‘FALSE’

                      DB Mapping - parties.birth_date The defendants DOB is derived from this database field, but is not returned. Instead the BE will set the is_youth flag depending on the DOB value parties.age
                  has_consolidated_accounts:
                    type: boolean
                    description: This field will return true if the account has had accounts consolidated into it or false if it has not.
                  account_status_reference:
                    $ref: './common.yaml#/components/schemas/accountStatusReference'
                  account_type:
                    type: string
                    description: DB Mapping - defendant_accounts.account_type
                    enum:
                      - Fine
                      - Conditional Caution
                      - Confiscation
                      - Fixed Penalty
                  originator_type:
                    type: string
                    description: NEW - DB Mapping - defendant_accounts.originator_type
                    enum:
                      - TFO
                      - FP
                      - CASE
                      - MAC
                  originator_name:
                    type: string
                    description: NEW - DB Mapping - defendant.accounts.originator_name
                  prosecutor_case_reference:
                    type: string
                    description: DB Mapping - defendant.accounts.prosecutor_case_reference
                  fixed_penalty_ticket_number:
                    type: string
                    description: |
                      Only provided for Fixed Penalty accounts
                      DB Mapping - fixed_penalty_offences.ticket_number
                  business_unit_summary:
                    $ref: './common.yaml#/components/schemas/businessUnitSummary'
                  payment_state_summary:
                    $ref: './common.yaml#/components/schemas/paymentStateSummary'
                  party_details:
                    $ref: './common.yaml#/components/schemas/partyDetails'
        400:
          description: Bad request
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        401:
          description: Unauthorized
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        403:
          description: Forbidden
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        500:
          description: Internal server error
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        503:
          description: Service unavailable
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
  /defendant-accounts/{id}/impositions:
    get:
      tags:
        - Defendant Account
      summary: Get Defendant Account Impositions
      description: The Get Defendant Account Impositions API is used return an array of data relating to impositions on a defendant account, which populates the on screen table.
      operationId: getDefendantAccountImpositions
      security:
        - permissions:
            - Search and View Accounts (in at least one business unit)
      parameters:
        - in: path
          name: id
          description: DB Mapping - defendant_accounts.defendant_account_id
          schema:
            type: integer
            format: int64
          required: true
      responses:
        '200':
          description: OK
          headers:
            ETag:
              $ref: './common.yaml#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/impositionSummary'

        400:
          description: Bad request
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        401:
          description: Unauthorized
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        403:
          description: Forbidden
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        500:
          description: Internal server error
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        503:
          description: Service unavailable
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'

  /defendant-accounts/search:
    post:
      tags:
        - Defendant Account
      summary: Search Defendant Accounts
      description: Searches defendant accounts based upon criteria in the request body.
      operationId: postDefendantAccountSearch
      security:
        - permissions:
            - Search and View Accounts (in at least one business unit)
      parameters:
        - in: header
          name: Authorization
          description: Bearer token
          schema:
            type: string
          required: false
      requestBody:
        description: Defendant account search criteria
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/postDefendantAccountSearchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/postDefendantAccountSearchResponse'
        400:
          description: Bad request
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        401:
          description: Unauthorized
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        403:
          description: Forbidden
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        500:
          description: Internal server error
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        503:
          description: Service unavailable
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'

  /defendant-accounts/{id}:
    patch:
      summary: Update a defendant account (partial update)
      operationId: updateDefendantAccount
      tags:
        - DefendantAccount

      parameters:
        - name: id
          in: path
          description: Defendant account identifier
          required: true
          schema:
            type: integer
            format: int64
        - in: header
          name: If-Match
          description: Version of the defendant account. DB Mapping - defendant_accounts.version
          schema:
            type: string
        - in: header
          name: Authorization
          description: Bearer token
          schema:
            type: string
          required: true
        - in: header
          name: Business-Unit-Id
          description: Business unit identifier
          schema:
            type: string
          required: true

      requestBody:
        description: Payload containing one of the updatable defendant-account fragments
        required: true
        content:
          application/json:
            schema:
              title: Update Defendant Account Request Payload
              type: object
              minProperties: 1
              maxProperties: 1

              oneOf:
                - required:
                    - comment_and_notes
                - required:
                    - enforcement_court
                - required:
                    - collection_order
                - required:
                    - enforcement_override

              properties:
                collection_order:
                  $ref: './common.yaml#/components/schemas/collectionOrder'

                comment_and_notes:
                  $ref: './common.yaml#/components/schemas/commentsAndNotes'

                enforcement_court:
                  $ref: '#/components/schemas/enforcementCourt'

                enforcement_override:
                  $ref: '#/components/schemas/enforcementOverride'


      responses:
        '201':
          description: Updated defendant account returned
          headers:
            ETag:
              schema:
                $ref: "./types.yaml#/components/schemas/BigInt"
          content:
            application/json:
              schema:
                title: Update Defendant Account Response Payload
                type: object
                required:
                  - id
                properties:
                  id:
                    type: integer
                    format: int64
                  collection_order:
                    $ref: './common.yaml#/components/schemas/collectionOrder'
                  comment_and_notes:
                    $ref: './common.yaml#/components/schemas/commentsAndNotes'
                  enforcement_court:
                    $ref: '#/components/schemas/enforcementCourt'
                  enforcement_override:
                    $ref: '#/components/schemas/enforcementOverride'
        400:
          description: Bad request
          content:
            application/json+problem:
              schema:
               $ref: './common.yaml#/components/schemas/ProblemDetail'
        401:
          description: Unauthorized
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        403:
          description: Forbidden
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        404:
          description: Not Found
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        409:
          description: Conflict
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        500:
          description: Internal server error
          content:
           application/json+problem:
             schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        503:
          description: Service unavailable
          content:
           application/json+problem:
             schema:
               $ref: './common.yaml#/components/schemas/ProblemDetail'
  /defendant-accounts/{id}/history:
    get:
      tags:
        - Defendant Account
      summary: Get Defendant Account History
      description: The Get Defendant Account History API will be used to return history items, representing a chronology of activity on the account - ordered from latest to oldest.
      operationId: getDefendantAccountHistory
      security:
        - permissions:
            - Search and View Accounts (in at least one business unit)
      parameters:
        - in: path
          name: id
          description: DB Mapping - defendant_accounts.defendant_account_id
          schema:
            type: integer
            format: int64
          required: true
        - in: query
          name: dateFrom
          description: Optional date parameter to filter history items from a specific date.
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          description: Optional date parameter to filter history items up to a specific date.
          schema:
            type: string
            format: date
        - in: query
          name: itemTypes
          description: Optional comma-separated list of history item types to filter by.
          schema:
            type: array
            items:
              type: string
              enum:
                - amendment
                - enforcement
                - financial
                - note
                - paymentTerms
            style: form
            explode: false
        - in: header
          name: Authorization
          description: Bearer token
          schema:
            type: string
          required: false
      responses:
        '200':
          description: OK
          headers:
            ETag:
              $ref: './common.yaml#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                properties:
                  historyItems:
                    type: array
                    items:
                      $ref: './history.yaml#/components/schemas/defendantAccountHistoryItem'
        400:
          description: Bad request
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        401:
          description: Unauthorized
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        403:
          description: Forbidden
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        500:
          description: Internal server error
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
        503:
          description: Service unavailable
          content:
            application/json+problem:
              schema:
                $ref: './common.yaml#/components/schemas/ProblemDetail'
components:
  schemas:
    postDefendantAccountSearchRequest:
      title: Defendant Account Search Request
      type: object
      required:
        - active_accounts_only
        - business_unit_ids
        - reference_number
        - defendant
      properties:
        active_accounts_only:
          type: boolean
        business_unit_ids:
          type:
            - array
            - 'null'
          items:
            type: integer
        consolidation_search:
          type:
            - boolean
            - 'null'
          description: Whether to use consolidated defendant account search.
        reference_number:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/defendantAccountSearchReferenceNumber'
        defendant:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/defendantAccountSearchDefendant'
      oneOf:
        - properties:
            reference_number:
              type: object
            defendant:
              const: null
        - properties:
            reference_number:
              const: null
            defendant:
              type: object

    defendantAccountSearchReferenceNumber:
      type: object
      required:
        - organisation
        - account_number
        - prosecutor_case_reference
      properties:
        organisation:
          type: boolean
        account_number:
          type:
            - string
            - 'null'
        prosecutor_case_reference:
          type:
            - string
            - 'null'
      oneOf:
        - properties:
            account_number:
              type: string
            prosecutor_case_reference:
              const: null
        - properties:
            account_number:
              const: null
            prosecutor_case_reference:
              type: string

    defendantAccountSearchDefendant:
      type: object
      required:
        - include_aliases
        - organisation
        - address_line_1
        - postcode
        - organisation_name
        - exact_match_organisation_name
        - surname
        - exact_match_surname
        - forenames
        - exact_match_forenames
        - birth_date
        - national_insurance_number
      properties:
        include_aliases:
          type: boolean
        organisation:
          type: boolean
        address_line_1:
          type:
            - string
            - 'null'
        postcode:
          type:
            - string
            - 'null'
        organisation_name:
          type:
            - string
            - 'null'
        exact_match_organisation_name:
          type:
            - boolean
            - 'null'
        surname:
          type:
            - string
            - 'null'
        exact_match_surname:
          type:
            - boolean
            - 'null'
        forenames:
          type:
            - string
            - 'null'
        exact_match_forenames:
          type:
            - boolean
            - 'null'
        birth_date:
          type:
            - string
            - 'null'
          format: date
        national_insurance_number:
          type:
            - string
            - 'null'
      oneOf:
        - properties:
            organisation:
              const: true
            organisation_name:
              type:
                - string
                - 'null'
            surname:
              const: null
            exact_match_surname:
              const: null
            forenames:
              const: null
            exact_match_forenames:
              const: null
            birth_date:
              const: null
            national_insurance_number:
              const: null
          anyOf:
            - required:
                - organisation_name
              properties:
                organisation_name:
                  type: string
            - required:
                - address_line_1
              properties:
                address_line_1:
                  type: string
            - required:
                - postcode
              properties:
                postcode:
                  type: string
        - properties:
            organisation:
              const: false
            organisation_name:
              const: null
            exact_match_organisation_name:
              const: null
            national_insurance_number:
              type:
                - string
                - 'null'
          anyOf:
            - required:
                - national_insurance_number
              properties:
                national_insurance_number:
                  type: string
            - required:
                - surname
              properties:
                surname:
                  type: string
            - required:
                - address_line_1
              properties:
                address_line_1:
                  type: string
            - required:
                - postcode
              properties:
                postcode:
                  type: string
      allOf:
        - if:
            required:
              - national_insurance_number
            properties:
              national_insurance_number:
                type: string
          then:
            properties:
              organisation:
                const: false
              address_line_1:
                const: null
              postcode:
                const: null
              organisation_name:
                const: null
              exact_match_organisation_name:
                const: null
              surname:
                const: null
              exact_match_surname:
                const: null
              forenames:
                const: null
              exact_match_forenames:
                const: null
              birth_date:
                const: null
        - if:
            required:
              - forenames
            properties:
              forenames:
                type: string
          then:
            properties:
              surname:
                type: string
        - if:
            required:
              - birth_date
            properties:
              birth_date:
                type: string
          then:
            properties:
              surname:
                type: string

    postDefendantAccountSearchResponse:
      title: Defendant Account Search Response
      type: object
      required:
        - count
        - defendant_accounts
      properties:
        count:
          type: integer
          description: The total number of records identified.
        defendant_accounts:
          type:
            - array
            - 'null'
          description: A list of defendant accounts. Null if none are found.
          items:
            $ref: '#/components/schemas/defendantAccountSearchResult'
      additionalProperties: false

    defendantAccountSearchResult:
      type: object
      description: Details of a defendant account. Consolidated search fields are present only for consolidated searches.
      required:
        - defendant_account_id
        - account_number
        - organisation
        - aliases
        - address_line_1
        - postcode
        - business_unit_name
        - business_unit_id
        - prosecutor_case_reference
        - last_enforcement_action
        - account_balance
        - organisation_name
        - defendant_title
        - defendant_firstnames
        - defendant_surname
        - birth_date
        - national_insurance_number
        - parent_guardian_surname
        - parent_guardian_firstnames
      properties:
        defendant_account_id:
          type: string
        account_number:
          type: string
        organisation:
          type: boolean
        aliases:
          type:
            - array
            - 'null'
          maxItems: 5
          items:
            $ref: '#/components/schemas/defendantAccountSearchAlias'
        address_line_1:
          type: string
        postcode:
          type:
            - string
            - 'null'
        business_unit_name:
          type: string
        business_unit_id:
          type: string
        prosecutor_case_reference:
          type:
            - string
            - 'null'
        last_enforcement_action:
          type:
            - string
            - 'null'
        account_balance:
          type: number
        organisation_name:
          type:
            - string
            - 'null'
        defendant_title:
          type:
            - string
            - 'null'
        defendant_firstnames:
          type:
            - string
            - 'null'
        defendant_surname:
          type:
            - string
            - 'null'
        birth_date:
          type:
            - string
            - 'null'
          format: date
        national_insurance_number:
          type:
            - string
            - 'null'
        parent_guardian_surname:
          type:
            - string
            - 'null'
        parent_guardian_firstnames:
          type:
            - string
            - 'null'
        has_collection_order:
          type:
            - boolean
            - 'null'
          description: Whether the account has a collection order. Present only for consolidated searches.
        account_version:
          type:
            - integer
            - 'null'
          description: Version number for the defendant account. Present only for consolidated searches.
        checks:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/defendantAccountSearchChecks'
      oneOf:
        - properties:
            organisation:
              const: true
            organisation_name:
              type: string
            defendant_title:
              const: null
            defendant_firstnames:
              const: null
            defendant_surname:
              const: null
            birth_date:
              const: null
            national_insurance_number:
              const: null
            parent_guardian_surname:
              const: null
            parent_guardian_firstnames:
              const: null
        - properties:
            organisation:
              const: false
            organisation_name:
              const: null
            defendant_title:
              type: string
            defendant_surname:
              type: string
      additionalProperties: false

    defendantAccountSearchChecks:
      type: object
      required:
        - warnings
        - errors
      properties:
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/defendantAccountSearchCheck'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/defendantAccountSearchCheck'
      additionalProperties: false

    defendantAccountSearchCheck:
      type: object
      required:
        - reference
        - message
      properties:
        reference:
          type: string
        message:
          type: string
      additionalProperties: false

    defendantAccountSearchAlias:
      type: object
      description: Details of a single alias.
      required:
        - alias_number
        - organisation_name
        - surname
        - forenames
      properties:
        alias_number:
          type: integer
        organisation_name:
          type:
            - string
            - 'null'
        surname:
          type:
            - string
            - 'null'
        forenames:
          type:
            - string
            - 'null'
      oneOf:
        - properties:
            organisation_name:
              type: string
            surname:
              const: null
            forenames:
              const: null
        - properties:
            organisation_name:
              const: null
            surname:
              type: string
      additionalProperties: false

    enforcementOverview:
      type: object
      additionalProperties: false
      properties:
        collection_order:
          $ref: './common.yaml#/components/schemas/collectionOrder'
        days_in_default:
          type: integer
        enforcement_court:
          $ref: './common.yaml#/components/schemas/courtReference'
      required:
        - collection_order
        - enforcement_court
    enforcementCourt:
      type: object
      properties:
        court_id:
          type: integer
          format: int64
      required:
        - court_id
    enforcementOverride:
      type: object
      properties:
        enforcement_override_result:
          allOf:
            - $ref: '#/components/schemas/enforcementOverrideResult'
          nullable: true
        enforcer:
            allOf:
              - $ref: '#/components/schemas/enforcer'
            nullable: true
        lja:
            allOf:
              - $ref: '#/components/schemas/localJusticeArea'
            nullable: true
    enforcementOverrideResult:
      type: object
      properties:
        enforcement_override_result_id:
          type: string
      required:
        - enforcement_override_result_id
    enforcer:
      type: object
      properties:
        enforcer_id:
          type: integer
          format: int64
      required:
        - enforcer_id
    localJusticeArea:
      type: object
      properties:
        lja_id:
          type: integer
      required:
        - lja_id
    enforcementAction:
      type: object
      additionalProperties: false
      properties:
        enforcement_action:
          $ref: './common.yaml#/components/schemas/resultReference'
        reason:
          type: string
        enforcer:
          $ref: './common.yaml#/components/schemas/enforcerReference'
        warrant_number:
          type: string
        date_added:
          type: string
          format: date-time
        result_responses:
          type: array
          items:
            $ref: './common.yaml#/components/schemas/resultResponses'
      required:
        - enforcement_action
        - date_added
