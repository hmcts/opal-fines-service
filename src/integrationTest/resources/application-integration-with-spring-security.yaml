spring:
  # Flyway
  flyway:
    locations: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/dev
    baseline-on-migrate: true
    ignoreMigrationPatterns: "*:missing"
  datasource:
    hikari:
      minimum-idle: 0
      maximum-pool-size: 4
  main:
    allow-bean-definition-overriding: true
  security:
    oauth2:
      client:
        registration:
          internal-azure-ad:
            issuer-uri: http://localhost:4553/opal/
        provider:
          internal-azure-ad-provider:
            jwk-set-uri: http://localhost:4553/opal/oauth2/jwks.json
logging:
  level:
    org:
      hibernate:
        SQL: INFO
        type:
          descriptor:
            sql:
              BasicBinder: WARN
      springframework:
        security: DEBUG
        jdbc:
          datasource:
            init: DEBUG
# Hibernate
jpa:
  hibernate:
    ddl-auto: validate
  show-sql: true

testcontainers:
  reuse:
    enable: true
legacy-gateway:
  url: http://localhost:4553/opal

user:
  service:
    url: http://localhost:4553/opal

security-it:
  key: ...some random string...
