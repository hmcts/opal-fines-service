import org.flywaydb.gradle.task.FlywayMigrateTask
import java.util.concurrent.TimeUnit

buildscript {
  ext {
    cucumberQueryVersion = "14.7.0"
    cucumberMessagesVersion = "30.1.0"
  }

  configurations.classpath {
    resolutionStrategy {
      force "io.cucumber:query:${cucumberQueryVersion}"
      force "io.cucumber:messages:${cucumberMessagesVersion}"
    }
  }

  dependencies {
    classpath("org.flywaydb:flyway-database-postgresql:13.0.0")
    // Pin transitive Cucumber artifacts used by the Serenity Gradle plugin to avoid
    // Maven metadata range lookups on CI when Maven Central is rate limiting.
    classpath("io.cucumber:query:${cucumberQueryVersion}")
    classpath("io.cucumber:messages:${cucumberMessagesVersion}")
  }
}

plugins {
  id 'application'
  id 'jacoco'
  id 'io.spring.dependency-management' version '1.1.7'
  id 'org.springframework.boot' version '4.1.0'
  id 'com.github.ben-manes.versions' version '0.54.0'
  id 'org.sonarqube' version '7.3.1.8318'
  id 'uk.gov.hmcts.java' version '0.12.70'
  id 'org.flywaydb.flyway' version '13.0.0'
  id 'net.serenity-bdd.serenity-gradle-plugin' version '5.3.9'
  id "org.openapi.generator" version "7.23.0"
}

ext {
  log4JVersion = "2.26.1"
  serenityVersion = "5.3.11"
  cucumberVersion = "7.23.0" // Keep the forced Cucumber version stable while aligning Serenity with the Gradle plugin
}

def defaultLegacyStubImage = 'hmctsprod.azurecr.io/opal/legacy-db-stub:latest'
def legacyStubImage = System.getenv('OPAL_LEGACY_STUB_IMAGE') ?: defaultLegacyStubImage
def legacyStubPort = 4553
def ciEnvironmentVariables = ['CI', 'GITHUB_ACTIONS', 'JENKINS_HOME', 'BUILD_ID']

def isLocalIntegrationEnvironment = {
  ciEnvironmentVariables.every { !System.getenv(it) }
}

def isPortAvailable = { int port ->
  try {
    def socket = new ServerSocket(port)
    socket.reuseAddress = true
    socket.close()
    true
  } catch (Exception ignored) {
    false
  }
}

def runLegacyStubCommand = { List<String> command, Map<String, String> extraEnv = [:] ->
  def processBuilder = new ProcessBuilder(command)
    .redirectErrorStream(true)

  if (!extraEnv.isEmpty()) {
    processBuilder.environment().putAll(extraEnv)
  }

  def process = processBuilder.start()

  def finished = process.waitFor(2, TimeUnit.MINUTES)
  if (!finished) {
    process.destroyForcibly()
    return [exitValue: 124, output: "Timed out running ${command.join(' ')}"]
  }

  [exitValue: process.exitValue(), output: process.inputStream.getText('UTF-8').trim()]
}

def pullLatestLegacyStubImageIfLocal = {
  if (!isLocalIntegrationEnvironment()) {
    logger.lifecycle("Skipping hmctsprod legacy stub login/pull outside a local integration run.")
    return
  }

  if (legacyStubImage != defaultLegacyStubImage) {
    logger.lifecycle("Skipping hmctsprod legacy stub login/pull because OPAL_LEGACY_STUB_IMAGE overrides the default image.")
    return
  }

  if (!isPortAvailable(legacyStubPort)) {
    logger.lifecycle("Skipping hmctsprod legacy stub login/pull because port ${legacyStubPort} is already in use.")
    return
  }

  try {
    def loginResult = runLegacyStubCommand(
      ['az', 'acr', 'login', '--name', 'hmctsprod', '--subscription', 'DCD-CNP-Prod'],
      [AZURE_CONFIG_DIR: '/opt/jenkins/.azure-prod']
    )
    if (loginResult.exitValue != 0) {
      logger.warn(
        "Could not log in to hmctsprod ACR before integration tests. Continuing with any locally cached image. Azure CLI output: {}",
        loginResult.output
      )
      return
    }

    def pullResult = runLegacyStubCommand(['docker', 'pull', legacyStubImage])
    if (pullResult.exitValue != 0) {
      logger.warn(
        "Failed to pull legacy stub image '{}' before integration tests. Continuing with any locally cached image. Docker output: {}",
        legacyStubImage,
        pullResult.output
      )
      return
    }

    logger.lifecycle("Pulled latest legacy stub image '{}'.", legacyStubImage)
  } catch (Exception e) {
    logger.warn(
      "Could not refresh legacy stub image '{}' before integration tests. Continuing with any locally cached image.",
      legacyStubImage,
      e
    )
  }
}

def logPublishedHtmlReport = { String label, String reportDirectory ->
  def indexFile = file("${reportDirectory}/index.html")
  if (indexFile.exists()) {
    logger.lifecycle("${label} available at - file://${indexFile.absolutePath}")
  } else {
    logger.lifecycle("${label} was not generated at ${reportDirectory}")
  }
}

def syncFunctionalArtifacts = { String reportLabel, String rawReportDirectory, String outputDirectory, String cucumberJsonFileName ->
  delete("${outputDirectory}/report")
  delete("${outputDirectory}/zephyr")

  if (file(rawReportDirectory).exists()) {
    copy {
      from(rawReportDirectory)
      into("${outputDirectory}/report")
    }
  }

  if (cucumberJsonFileName != null) {
    def cucumberJsonFile = file("${rootDir}/target/zephyr-reports/${cucumberJsonFileName}")
    if (cucumberJsonFile.exists()) {
      copy {
        from(cucumberJsonFile)
        into("${outputDirectory}/zephyr")
      }
    }
  }

  logPublishedHtmlReport(reportLabel, "${outputDirectory}/report")
}

group = 'uk.gov.hmcts'
version = '0.0.1'

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

sourceSets {
  openapi {
    java {
      srcDirs = [file('src/openApi/java')]
    }
    resources.srcDirs = [file('src/openApi/resources')]
  }
  main {
    java {
      srcDir "$buildDir/generated/openapi/src/main/java"
    }
  }

  functionalTest {
    java {
      compileClasspath += main.output
      runtimeClasspath += main.output
      srcDir file('src/functionalTest/java')
    }
    resources.srcDir file('src/functionalTest/resources')
  }

  integrationTest {
    java {
      compileClasspath += main.output
      runtimeClasspath += main.output
      srcDir file('src/integrationTest/java')
    }
    resources.srcDir file('src/integrationTest/resources')
  }
}

configurations {
  openapiImplementation.extendsFrom implementation
  openapiRuntimeOnly.extendsFrom runtimeOnly

  functionalTestImplementation.extendsFrom testImplementation
  functionalTestRuntimeOnly.extendsFrom runtimeOnly

  integrationTestImplementation.extendsFrom testImplementation
  integrationTestRuntimeOnly.extendsFrom runtimeOnly

  smokeTestImplementation.extendsFrom testImplementation
  smokeTestRuntimeOnly.extendsFrom runtimeOnly

  zephyrCucumberReportProcessor
}

configurations.configureEach {
  resolutionStrategy {
    force "io.cucumber:cucumber-core:${cucumberVersion}"
    force "io.cucumber:cucumber-java:${cucumberVersion}"
    force "io.cucumber:cucumber-junit:${cucumberVersion}"
  }
}

tasks.register("bundleOpenApi", JavaExec) {
  dependsOn 'compileOpenapiJava'
  classpath = sourceSets.openapi.runtimeClasspath
  group = "openapi"
  description = "Bundle multiple OpenAPI YAML files into one"
  mainClass = 'uk.gov.hmcts.opal.openapi.OpenApiBundler'
  args = ["$rootDir/src/main/resources/openapi", layout.buildDirectory.file("openapi-bundled.yaml").get().asFile.absolutePath]
}

openApiGenerate {
  generatorName = "spring"
  inputSpec = layout.buildDirectory.file("openapi-bundled.yaml").get().asFile.absolutePath
  outputDir = layout.buildDirectory.dir("generated/openapi").get().asFile.absolutePath
  apiPackage = "uk.gov.hmcts.opal.generated.".toString() + "http.api"
  modelPackage = "uk.gov.hmcts.opal.generated.".toString() + "model"
  importMappings = [
    Nullable: "org.jspecify.annotations.Nullable",
    Short: "java.lang.Short"
  ]
  typeMappings = [
    "integer+int16": "short"
  ]
  // Point to your customized mustache templates
  templateDir = "$rootDir/openapi/templates".toString()
  generateApiTests = false
  generateModelTests = false
  skipOperationExample = true
  openapiNormalizer = [
    REF_AS_PARENT_IN_ALLOF: "true"
  ]
  configOptions = [
    dateLibrary                         : "java8-localdatetime",
    interfaceOnly                       : "true",
    useTags                             : "true",
    useSpringBoot4                      : "true",
    containerDefaultToNull              : "true",
    generatedConstructorWithRequiredArgs: "false",
    useBeanValidation                   : "true",
    useLombokAnnotations                : "true",
    generateBuilders                    : "true"
  ]
}
// (Temp?) Fix to solve the issue:
// Toolchain from `executable` property does not match toolchain from `javaLauncher` property.
gradle.taskGraph.whenReady { taskGraph ->
  def task = taskGraph.allTasks.find { it.name.endsWith(".main()") }
  if (task instanceof JavaExec) {
    task.executable = task.javaLauncher.get().executablePath.asFile.absolutePath
  }
}


tasks.withType(JavaCompile).configureEach {
  options.compilerArgs << "-Xlint:unchecked"
//  Enable the following to stop the build on any warning messages (not just error messages)
  options.compilerArgs << "-Werror"
//  Change the maximum number of reported compiler errors (default 100)
  options.compilerArgs.addAll("-Xmaxerrs", "200")
}

// https://github.com/gradle/gradle/issues/16791
tasks.withType(JavaExec).configureEach {
  javaLauncher.set(javaToolchains.launcherFor(java.toolchain))
}

tasks.withType(Test).configureEach {
  useJUnitPlatform()

  systemProperty 'spring.test.context.cache.maxSize', 4

  testLogging {
    exceptionFormat = 'full'
  }
  maxHeapSize = "2g"
  failFast = false
}

tasks.register('integration', Test) {
  description = "Runs integration tests"
  group = "Verification"
  testClassesDirs = sourceSets.integrationTest.output.classesDirs
  classpath = sourceSets.integrationTest.runtimeClasspath
  exclude '**/ReportQueueConnectivityIntegrationTest.class'
  doFirst {
    pullLatestLegacyStubImageIfLocal()
  }
  finalizedBy 'packageIntegrationOutput'
}

tasks.register('checkTestJiraAnnotations', JavaExec) {
  description = "Checks runnable integration and functional tests have Jira story and epic annotations"
  group = "Verification"
  dependsOn 'testClasses'
  classpath = sourceSets.test.runtimeClasspath
  mainClass = 'uk.gov.hmcts.opal.scripts.TestJiraAnnotationChecker'
  args = ['src/integrationTest/java', 'src/functionalTest/resources/features']
}

tasks.register('functionalOpal', Test) {

  description = "Runs functional tests against Opal mode"
  group = "Verification"
  testClassesDirs = sourceSets.functionalTest.output.classesDirs
  classpath = sourceSets.functionalTest.runtimeClasspath
  outputs.upToDateWhen { false }
  reports.junitXml.getOutputLocation().set(layout.buildDirectory.dir("test-results/functional/opal"))
  testLogging.showStandardStreams = true
  environment("IS_LEGACY_MODE", "false")
  systemProperty 'cucumber.plugin',
    "net.serenitybdd.cucumber.core.plugin.SerenityReporterParallel,pretty,json:${rootDir}/target/zephyr-reports/cucumber-opal.json,timeline:${rootDir}/target/test-results/timeline"
  include '**/OpalTestRunner.class'

  finalizedBy 'copyOpalCucumberJson', 'mergeFunctionalResults', 'aggregate', 'copyFunctionalReport'
}

tasks.register('copyOpalCucumberJson', Copy) {
  from("${rootDir}/target/zephyr-reports/cucumber-opal.json")
  into("${rootDir}/functional-output/zephyr")
  outputs.upToDateWhen { false }
}

tasks.register('functionalOpalTags', Test) {
  description = "Runs tagged Opal functional tests"
  group = "Verification"
  testClassesDirs = sourceSets.functionalTest.output.classesDirs
  classpath = sourceSets.functionalTest.runtimeClasspath
  outputs.upToDateWhen { false }
  reports.junitXml.getOutputLocation().set(layout.buildDirectory.dir("test-results/functional/opal-tags"))
  testLogging.showStandardStreams = true
  environment("IS_LEGACY_MODE", "false")
  systemProperty 'cucumber.plugin',
    "net.serenitybdd.cucumber.core.plugin.SerenityReporterParallel,pretty,json:${rootDir}/target/zephyr-reports/cucumber-opal-tags.json,timeline:${rootDir}/target/test-results/timeline"

  include '**/OpalTaggedTestRunner.class'

  doFirst {
    def propertyTags = project.findProperty('tags')
    def envTags = System.getenv('TAGS')
    def cucumberTags = propertyTags ?: envTags

    if (cucumberTags == null || cucumberTags.toString().trim().isEmpty()) {
      throw new GradleException(
        "Set TAGS or -Ptags when running functionalOpalTags, for example TAGS='@R1BOff'"
      )
    }

    systemProperty 'cucumber.filter.tags', cucumberTags.toString()
  }

  finalizedBy 'copyOpalTagsCucumberJson', 'mergeFunctionalOpalTagsResults', 'aggregate', 'copyDemoFunctionalReport',
    'packageTaggedDemoFunctionalOutput'
}

