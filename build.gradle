tasks.register('functional') {
  description = "Runs functional tests"
  group = "Verification"
  dependsOn('clearReports', 'functionalOpal', 'aggregate', 'copyFunctionalReport', 'mergeFunctionalResults')
  tasks.functionalOpal.mustRunAfter clearReports
  tasks.mergeFunctionalResults.mustRunAfter functionalOpal
  tasks.aggregate.mustRunAfter functionalOpal
  tasks.copyFunctionalReport.mustRunAfter aggregate
}

tasks.register('functionalWithTags') {
  description = "Runs functional tests with the default Opal suite plus tagged Opal scenarios"
  group = "Verification"
  dependsOn('clearReports', 'functionalOpal', 'functionalOpalTags', 'aggregate', 'copyDemoFunctionalReport',
    'mergeFunctionalWithTagsResults')
  tasks.functionalOpal.mustRunAfter clearReports
  tasks.functionalOpalTags.mustRunAfter functionalOpal
  tasks.mergeFunctionalWithTagsResults.mustRunAfter functionalOpalTags
  tasks.aggregate.mustRunAfter functionalOpalTags
  tasks.copyDemoFunctionalReport.mustRunAfter aggregate
  finalizedBy 'packageDemoFunctionalOutput'
}


tasks.register('smokeOpal', Test) {
  description = "Runs Smoke Tests"
  group = "Verification"
  testClassesDirs = sourceSets.functionalTest.output.classesDirs
  classpath = sourceSets.functionalTest.runtimeClasspath
  reports.junitXml.getOutputLocation().set(layout.buildDirectory.dir("test-results/smoke"))
  testLogging.showStandardStreams = true
  systemProperty 'cucumber.plugin',
    "net.serenitybdd.cucumber.core.plugin.SerenityReporterParallel,pretty,json:${rootDir}/target/zephyr-reports/cucumber-smoke.json,timeline:${rootDir}/target/test-results/timeline"

  include '**/SmokeTestRunner.class'
  finalizedBy 'copySmokeCucumberJson', 'aggregate', 'copySmokeReport', 'packageSmokeOutput'

}
tasks.register('copySmokeReport', Copy) {
  dependsOn 'aggregate'
  from("${rootDir}/target/site/serenity")
  into("${rootDir}/smoke-test-report")
  doLast {
    logPublishedHtmlReport("Smoke Test Report", "${rootDir}/smoke-test-report")
  }
}
tasks.register('copySmokeCucumberJson', Copy) {
  from("${rootDir}/target/zephyr-reports/cucumber-smoke.json")
  into("${rootDir}/smoke-output/zephyr")
  rename { "cucumber-smoke.json" }
  outputs.upToDateWhen { false }
}
tasks.register('packageSmokeOutput', Copy) {
  dependsOn 'copySmokeReport', 'copySmokeCucumberJson'
  into("${rootDir}/smoke-output")
  from("${rootDir}/smoke-test-report") {
    into("report")
  }
}

tasks.register('smoke') {
  description = "Runs Smoke Tests"
  group = "Verification"
  dependsOn('clearReports', 'smokeOpal', 'aggregate', 'copySmokeReport')
  tasks.smokeOpal.mustRunAfter clearReports
  tasks.aggregate.mustRunAfter smokeOpal
  tasks.copySmokeReport.mustRunAfter aggregate
  finalizedBy 'packageSmokeOutput'

}

// Jenkins sometimes invokes Serenity-producing tasks as separate top-level tasks.
// Keep the execution order deterministic and aggregate against the JUnit XML roots
// that the functional and smoke suites actually generate.
tasks.named('clearReports') {
  doLast {
    delete(layout.buildDirectory.dir("test-results"))
  }
}

tasks.named('aggregate') {
  testRoot = layout.buildDirectory.dir("test-results").get().asFile.absolutePath
  mustRunAfter(
    tasks.named('functionalOpal'),
    tasks.named('functionalLegacy'),
    tasks.named('functionalOpalTags'),
    tasks.named('functionalOpalTagsR1AOnly'),
    tasks.named('functionalOpalTagsR1AAndR1BOnly'),
    tasks.named('functionalOpalTagsAllFlagsOff'),
    tasks.named('smokeOpal'),
    tasks.named('mergeFunctionalResults'),
    tasks.named('mergeFunctionalWithTagsResults'),
    tasks.named('mergeFunctionalOpalTagsResults'),
    tasks.named('mergeFunctionalOpalTagsR1AOnlyResults'),
    tasks.named('mergeFunctionalOpalTagsR1AAndR1BOnlyResults'),
    tasks.named('mergeFunctionalOpalTagsAllFlagsOffResults')
  )
}

tasks.configureEach {
  if (name in ['copyFunctionalReport', 'copyDemoFunctionalReport', 'copyR1AOnlyDemoFunctionalReport',
               'copyR1AAndR1BDemoFunctionalReport',
               'copyAllFlagsOffDemoFunctionalReport', 'copySmokeReport']) {
    mustRunAfter tasks.named('aggregate')
  } else if (name == 'copyOpalCucumberJson') {
    mustRunAfter tasks.named('functionalOpal')
  } else if (name == 'copyOpalTagsCucumberJson') {
    mustRunAfter tasks.named('functionalOpalTags')
  } else if (name == 'copyR1AOnlyDemoCucumberJson') {
    mustRunAfter tasks.named('functionalOpalTagsR1AOnly')
  } else if (name == 'copyR1AAndR1BDemoCucumberJson') {
    mustRunAfter tasks.named('functionalOpalTagsR1AAndR1BOnly')
  } else if (name == 'copyAllFlagsOffDemoCucumberJson') {
    mustRunAfter tasks.named('functionalOpalTagsAllFlagsOff')
  } else if (name == 'copyLegacyCucumberJson') {
    mustRunAfter tasks.named('functionalLegacy')
  } else if (name == 'copySmokeCucumberJson') {
    mustRunAfter tasks.named('smokeOpal')
  }
}

def coverageExclusions = [
  '**/uk/gov/hmcts/opal/**/model/**',
  '**/uk/gov/hmcts/opal/**/config/**',
  '**/uk/gov/hmcts/opal/authentication/client/**',
  '**/uk/gov/hmcts/opal/**/exception/**',
  '**/uk/gov/hmcts/opal/service/DefendantAccountService.java',
  '**/uk/gov/hmcts/opal/service/legacy/LegacyDefendantAccountService.java',
  '**/uk/gov/hmcts/opal/service/opal/OpalDefendantAccountService.java'
]

jacocoTestReport {
  executionData(test, integration)
  reports {
    xml.required = true
    html.required = true
    csv.required = false
    html.outputLocation.set(layout.buildDirectory.dir("jacocoHtml"))
  }
  afterEvaluate {
    classDirectories.setFrom(files(classDirectories.files.collect {
      fileTree(dir: it, exclude: jacocoExclusionArray(coverageExclusions)
      )
    }))
  }
}

static String[] jacocoExclusionArray(ArrayList<String> exclusions) {
  final def lst = new ArrayList<String>()

  exclusions.stream().forEach { it.endsWith(".java") ? lst.add(it.replace(".java", ".class")) : lst.add(it) }

  return lst.toArray()
}

tasks.named("sonarqube") {
  dependsOn(tasks.named("jacocoTestReport"))
}
tasks.named("check") {
  dependsOn(tasks.named("checkTestJiraAnnotations"))
  dependsOn(tasks.named("integration"))
}

